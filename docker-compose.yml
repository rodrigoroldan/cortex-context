version: "3.8"

# ── Rede ─────────────────────────────────────────────────────────────────────
# Modo padrão: network_mode: host (necessário para Docker em LXC unprivileged Proxmox).
# Bridge networking requer sysctl net.ipv4.ip_unprivileged_port_start=0 que não
# está disponível em LXC unprivileged. Com host networking, serviços se comunicam
# via localhost e são acessíveis diretamente no IP do host/LXC.
#
# Para usar bridge networking (fora de LXC ou com LXC privilegiado):
#   1. Comente os blocos `network_mode: host` abaixo
#   2. Descomente os blocos `networks:` abaixo
#   3. Mude NEO4J_URI para bolt://neo4j:7687
#   4. Adicione ports: - "7474:7474" e "8082:8082"
#
# networks:
#   cortex-net:
#     driver: bridge

services:
  neo4j:
    image: neo4j:5.18-community
    container_name: cortex-neo4j
    restart: unless-stopped
    network_mode: host
    # networks: [cortex-net]        # ← descomentar para bridge mode
    # ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-cortex-secret}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  cortex:
    image: ghcr.io/rodrigoroldan/cortex-context:latest
    build: .
    container_name: cortex-api
    restart: unless-stopped
    network_mode: host
    # networks: [cortex-net]        # ← descomentar para bridge mode
    # ports: ["8082:8082"]
    environment:
      NEO4J_URI: bolt://localhost:7687 # bolt://neo4j:7687 para bridge mode
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-cortex-secret}
      CORTEX_API_TOKEN: ${CORTEX_API_TOKEN:-dev-token}
      SPECS_DIR: /specs
      APP_ENV: production
      LOG_LEVEL: INFO
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - ${SPECS_DIR:-./specs-sample}:/specs:ro
      - ${REPOS_DIR:-./repos-sample}:/repos:ro
      - ${WORKSPACE_DIR:-./repos-sample}:/workspace:ro
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j-data:
  neo4j-logs:

