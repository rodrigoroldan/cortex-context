version: "3.8"

# Nota: network_mode: host necessário para Docker em LXC unprivileged (Proxmox).
# Bridge networking requer sysctl net.ipv4.ip_unprivileged_port_start que não está
# disponível em LXC unprivileged. Com host networking, serviços se comunicam via
# localhost e são acessíveis diretamente no IP do LXC.

services:
  neo4j:
    image: neo4j:5.18-community
    container_name: cortex-neo4j
    restart: unless-stopped
    network_mode: host
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-cortex-secret}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  cortex:
    build: .
    container_name: cortex-api
    restart: unless-stopped
    network_mode: host
    environment:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-cortex-secret}
      CORTEX_API_TOKEN: ${CORTEX_API_TOKEN:-dev-token}
      SPECS_DIR: /specs
      APP_ENV: production
      LOG_LEVEL: INFO
    volumes:
      - ${SPECS_DIR:-./specs-sample}:/specs:ro
      - ${REPOS_DIR:-./repos-sample}:/repos:ro
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j-data:
  neo4j-logs:
