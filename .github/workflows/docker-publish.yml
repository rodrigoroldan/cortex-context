name: 🐳 Build and Publish Docker Image

on:
  push:
    branches:
      - main # → tag 'latest'
      - develop # → tag 'develop'
    tags:
      - "v*" # → tags de versão semântica (alinhado com cli-cortex-context)
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      push:
        description: "Enviar imagem para os registries?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GHCR_IMAGE: ghcr.io/rodrigoroldan/cortex-context

jobs:
  build-and-push:
    name: 🏗️ Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Necessário para push no GHCR

    steps:
      - name: 🧹 Clean workspace
        run: |
          WORK_DIR="${GITHUB_WORKSPACE}"
          cd ..
          rm -rf "${WORK_DIR}" || true
          mkdir -p "${WORK_DIR}"
          cd "${WORK_DIR}"
          # Limpar imagens Docker antigas (>7 dias)
          docker image prune -a -f --filter "until=168h" 2>/dev/null || true
          docker builder prune -f --filter "until=168h" 2>/dev/null || true

      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: 🔑 Log in to GHCR (GitHub Container Registry)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-,enable=${{ github.ref_type == 'branch' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: 🔨 Build and push (GHCR)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' && (github.event.inputs.push != 'false') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Embeddings variant ──────────────────────────────────────────────────
      - name: 🏷️ Extract metadata (embeddings)
        id: meta-embeddings
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=ref,event=branch,suffix=-embeddings
            type=semver,pattern={{version}},suffix=-embeddings
            type=semver,pattern={{major}}.{{minor}},suffix=-embeddings
            type=semver,pattern={{major}},suffix=-embeddings
            type=raw,value=latest-embeddings,enable=${{ github.ref == 'refs/heads/main' }}

      - name: 🔨 Build and push — embeddings variant (GHCR)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: embeddings
          push: ${{ github.event_name != 'pull_request' && (github.event.inputs.push != 'false') }}
          tags: ${{ steps.meta-embeddings.outputs.tags }}
          labels: ${{ steps.meta-embeddings.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── GPU variant (embeddings stage + PyTorch CUDA) ──────────────────────
      - name: 🏷️ Extract metadata (gpu)
        id: meta-gpu
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=ref,event=branch,suffix=-gpu
            type=semver,pattern={{version}},suffix=-gpu
            type=semver,pattern={{major}}.{{minor}},suffix=-gpu
            type=semver,pattern={{major}},suffix=-gpu
            type=raw,value=latest-gpu,enable=${{ github.ref == 'refs/heads/main' }}

      - name: 🔨 Build and push — gpu variant (GHCR)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: embeddings
          build-args: GPU=true
          push: ${{ github.event_name != 'pull_request' && (github.event.inputs.push != 'false') }}
          tags: ${{ steps.meta-gpu.outputs.tags }}
          labels: ${{ steps.meta-gpu.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📊 Build Summary
        if: always()
        run: |
          echo "### 🐳 Imagens Docker publicadas!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Variante | Registry | Tags |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| **base** | **GHCR** | \`${{ steps.meta.outputs.tags }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **embeddings** | **GHCR** | \`${{ steps.meta-embeddings.outputs.tags }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **gpu** | **GHCR** | \`${{ steps.meta-gpu.outputs.tags }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
