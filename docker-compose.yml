version: "3.8"

services:
  neo4j:
    image: neo4j:5.18-community
    container_name: cortex-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474" # Neo4j Browser UI
      - "7687:7687" # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-cortex-secret}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 5

  cortex:
    build: .
    container_name: cortex-api
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-cortex-secret}
      CORTEX_API_TOKEN: ${CORTEX_API_TOKEN:-dev-token}
      SPECS_DIR: /specs
      APP_ENV: production
      LOG_LEVEL: INFO
    volumes:
      - ${SPECS_DIR:-./specs-sample}:/specs:ro
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j-data:
  neo4j-logs:
